name: Deploy Docker Images

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/deploy.yml
      - backend/**
      - frontend/**
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: minor
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
      tag_name: ${{ steps.bump.outputs.tag_name }}
      tag_already_exists: ${{ steps.bump.outputs.tag_already_exists }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semantic version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          EXISTING_TAG_ON_HEAD="$(git tag --points-at HEAD -l 'v*' --sort=-v:refname | head -n 1)"
          if [ -n "$EXISTING_TAG_ON_HEAD" ]; then
            EXISTING_VERSION="${EXISTING_TAG_ON_HEAD#v}"
            echo "bump_type=reuse" >> "$GITHUB_OUTPUT"
            echo "version=$EXISTING_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag_name=$EXISTING_TAG_ON_HEAD" >> "$GITHUB_OUTPUT"
            echo "tag_already_exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_TAG="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump }}"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qiE '(#major|\[major\]|BREAKING CHANGE)'; then
              BUMP_TYPE="major"
            else
              BUMP_TYPE="minor"
            fi
          fi

          if [ -z "$LATEST_TAG" ]; then
            NEXT_VERSION="1.0"
            echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
            echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag_name=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"
            echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_VERSION="${LATEST_TAG#v}"
          MAJOR="${LATEST_VERSION%%.*}"
          MINOR="${LATEST_VERSION##*.}"

          if [ "$BUMP_TYPE" = "major" ]; then
            NEXT_MAJOR=$((MAJOR + 1))
            NEXT_MINOR=0
          else
            NEXT_MAJOR=$MAJOR
            NEXT_MINOR=$((MINOR + 1))
          fi

          NEXT_VERSION="${NEXT_MAJOR}.${NEXT_MINOR}"

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=v$NEXT_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_already_exists=false" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare-version
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: nguyensyphuc-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: nguyensyphuc-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker Hub secrets
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "::error title=Missing secret DOCKERHUB_USERNAME::Repository secret DOCKERHUB_USERNAME is empty or unavailable. Go to Settings > Secrets and variables > Actions and create it with your Docker Hub username."
            exit 1
          fi
          if [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "::error title=Missing secret DOCKERHUB_TOKEN::Repository secret DOCKERHUB_TOKEN is empty or unavailable. Go to Settings > Secrets and variables > Actions and create it with a valid Docker Hub access token."
            exit 1
          fi
          echo "Docker Hub secrets detected for user ${DOCKERHUB_USERNAME}."

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare-version.outputs.version }}
            type=raw,value=latest

      - name: Show release version
        run: |
          echo "Release version v${{ needs.prepare-version.outputs.version }} (bump: ${{ needs.prepare-version.outputs.bump_type }})"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  create-tag:
    needs:
      - prepare-version
      - build-and-push
    if: ${{ needs.prepare-version.outputs.tag_already_exists != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git fetch --tags --force
          if git rev-parse "${{ needs.prepare-version.outputs.tag_name }}" >/dev/null 2>&1; then
            echo "Tag ${{ needs.prepare-version.outputs.tag_name }} already exists, skipping."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ needs.prepare-version.outputs.tag_name }}"
          git push origin "${{ needs.prepare-version.outputs.tag_name }}"

  deploy-devops-classroom:
    needs:
      - prepare-version
      - build-and-push
      - create-tag
    runs-on: ubuntu-latest
    if: ${{ always() && needs.build-and-push.result == 'success' && (needs.create-tag.result == 'success' || needs.create-tag.result == 'skipped') }}
    env:
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
      IMAGE_TAG: latest
    steps:
      - name: Validate deploy webhook secret
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "::error title=Missing secret DEPLOY_URL::Repository secret DEPLOY_URL is empty or unavailable. Go to Settings > Secrets and variables > Actions and create it with your deploy webhook URL."
            exit 1
          fi

      - name: Trien khai backend len DevOps Classroom
        shell: bash
        run: |
          set -euo pipefail
          REPO="phucdeptrai29/nguyensyphuc-backend"
          WEBHOOK_URL="${DEPLOY_URL}?repo=${REPO}&tag=${IMAGE_TAG}"

          set +e
          RESPONSE=$(curl --http1.1 --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -sS -w "\n%{http_code}" -X POST -H "Content-Length: 0" "$WEBHOOK_URL")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl exit code: $CURL_EXIT"
            echo "::error title=Webhook call failed::curl failed before receiving HTTP status from DEPLOY_URL."
            exit 1
          fi

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          if ! [[ "$CODE" =~ ^[0-9]{3}$ ]]; then
            echo "::error title=Invalid webhook response::Expected HTTP status code but got: $CODE"
            echo "Raw response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Webhook HTTP: $CODE"
          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error title=Deploy failed::Webhook returned non-2xx status: $CODE"
            exit 1
          fi

          echo "Deploy backend thanh cong."

      - name: Trien khai frontend len DevOps Classroom
        shell: bash
        run: |
          set -euo pipefail
          REPO="phucdeptrai29/nguyensyphuc-frontend"
          WEBHOOK_URL="${DEPLOY_URL}?repo=${REPO}&tag=${IMAGE_TAG}"

          set +e
          RESPONSE=$(curl --http1.1 --retry 3 --retry-all-errors --connect-timeout 10 --max-time 30 -sS -w "\n%{http_code}" -X POST -H "Content-Length: 0" "$WEBHOOK_URL")
          CURL_EXIT=$?
          set -e

          if [ "$CURL_EXIT" -ne 0 ]; then
            echo "curl exit code: $CURL_EXIT"
            echo "::error title=Webhook call failed::curl failed before receiving HTTP status from DEPLOY_URL."
            exit 1
          fi

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          if ! [[ "$CODE" =~ ^[0-9]{3}$ ]]; then
            echo "::error title=Invalid webhook response::Expected HTTP status code but got: $CODE"
            echo "Raw response:"
            echo "$RESPONSE"
            exit 1
          fi

          echo "Webhook HTTP: $CODE"
          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error title=Deploy failed::Webhook returned non-2xx status: $CODE"
            exit 1
          fi

          echo "Deploy frontend thanh cong."
