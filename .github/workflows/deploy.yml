name: Deploy Docker Images

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump type"
        required: true
        default: minor
        type: choice
        options:
          - minor
          - major

permissions:
  contents: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  prepare-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      bump_type: ${{ steps.bump.outputs.bump_type }}
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next semantic version
        id: bump
        shell: bash
        run: |
          set -euo pipefail

          git fetch --tags --force

          LATEST_TAG="$(git tag -l 'v*' --sort=-v:refname | head -n 1)"
          if [ -z "$LATEST_TAG" ]; then
            LATEST_VERSION="1.0"
          else
            LATEST_VERSION="${LATEST_TAG#v}"
          fi

          MAJOR="${LATEST_VERSION%%.*}"
          MINOR="${LATEST_VERSION##*.}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            BUMP_TYPE="${{ github.event.inputs.bump }}"
          else
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if echo "$COMMIT_MSG" | grep -qiE '(#major|\[major\]|BREAKING CHANGE)'; then
              BUMP_TYPE="major"
            else
              BUMP_TYPE="minor"
            fi
          fi

          if [ "$BUMP_TYPE" = "major" ]; then
            NEXT_MAJOR=$((MAJOR + 1))
            NEXT_MINOR=0
          else
            NEXT_MAJOR=$MAJOR
            NEXT_MINOR=$((MINOR + 1))
          fi

          NEXT_VERSION="${NEXT_MAJOR}.${NEXT_MINOR}"

          echo "bump_type=$BUMP_TYPE" >> "$GITHUB_OUTPUT"
          echo "version=$NEXT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push git tag
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "v${{ steps.bump.outputs.version }}"
          git push origin "v${{ steps.bump.outputs.version }}"

  build-and-push:
    needs: prepare-version
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: nguyensyphuc-backend
            context: ./backend
            dockerfile: ./backend/Dockerfile
          - image_name: nguyensyphuc-frontend
            context: ./frontend
            dockerfile: ./frontend/Dockerfile

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ matrix.image_name }}
          tags: |
            type=raw,value=${{ needs.prepare-version.outputs.version }}
            type=raw,value=latest
            type=raw,value=main
            type=sha,format=short

      - name: Show release version
        run: |
          echo "Release version v${{ needs.prepare-version.outputs.version }} (bump: ${{ needs.prepare-version.outputs.bump_type }})"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
