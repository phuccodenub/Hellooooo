spring.application.name=NguyenSyPhuc
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/intro}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:intro_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:intro_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

app.cors.allowed-origin=${APP_CORS_ALLOWED_ORIGIN:http://localhost:3000}
